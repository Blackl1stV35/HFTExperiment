# SAC RL agent — A100 tuned
agent:
  obs_dim: 13
  hidden_dims: [512, 512]   # A100: was [256,256] — wider nets
  gamma: 0.99
  tau: 0.005
  lr: 3.0e-4
  buffer_capacity: 2_000_000  # A100 CPU RAM: 128 GB — 4× buffer
  batch_size: 4096            # A100: was 256 — larger SAC batches

training:
  steps: 1_500_000
  eval_every: 16000
  curriculum_warmup: 100000
  seed: 42

environment:
  max_hold: 80
  episode_len: 8000
  confidence_gate: 0.70
  spread_pips: 2.0
  pip_value: 0.10
  commission_usd: 0.70
  initial_balance: 10000.0

reward:
  mtm_scale: 0.05
  hold_penalty_coeff: 0.003
  early_cut_bonus_frac: 0.40

regime:
  regime_csv: data/regime/daily_regime_labels.csv
  gs_q1_hold: 40
  gs_q23_hold: 60
  gs_q4_hold: 80
  gmm2_entry_gate: true