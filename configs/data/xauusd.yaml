name: xauusd
symbol: XAUUSD
timeframe: M1

source:
  type: mt5
  duckdb_path: data/ticks.duckdb

preprocessing:
  scaling: window_minmax
  window_size: 120
  fill_gaps: forward_fill
  remove_weekends: true

labeling:
  method: triple_barrier   # triple_barrier | macd_rsi | hybrid
  profit_target_pips: 300  # $30 at pip_value=0.10
  stop_loss_pips: 150      # $15
  max_holding_bars: 120    # 2 hours — forces hold labels
  pip_value: 0.10

sentiment:
  enabled: false           # enable after >60% daily coverage
  model: ProsusAI/finbert
  embedding_dim: 768
  training_source:
    type: ft_sitemap
    cache_dir: data/ft_cache
  live_source:
    type: gdelt
    update_interval: 900
