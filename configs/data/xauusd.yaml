name: xauusd
symbol: XAUUSD
timeframe: M1

source:
  type: mt5
  duckdb_path: data/ticks.duckdb

preprocessing:
  scaling: window_minmax
  window_size: 120
  fill_gaps: forward_fill
  remove_weekends: true

labeling:
  method: hybrid              # sweep-confirmed optimal (was triple_barrier)
  profit_target_pips: 300
  stop_loss_pips: 150
  max_holding_bars: 80        # PATCH v2: aligned to RL sweep-optimal (was 120)
  pip_value: 0.10

sentiment:
  enabled: false
  model: ProsusAI/finbert
  embedding_dim: 768
  training_source:
    type: ft_sitemap
    cache_dir: data/ft_cache
  live_source:
    type: gdelt
    update_interval: 900
