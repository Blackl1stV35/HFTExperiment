# XAUUSD M1 data configuration — Phase 3
name: xauusd
symbol: XAUUSD
timeframe: M1

preprocessing:
  scaling: window_minmax
  window_size: 120

labeling:
  method: hybrid
  profit_target_pips: 300
  stop_loss_pips: 150
  max_holding_bars: 80          # aligned with sweep-optimal max_hold
  pip_value: 0.10
  # Phase 3: explicit class weights [sell, hold, buy]
  # Overrides auto-computed sqrt-dampened weights in the balanced sampler
  class_weights: [2.5, 0.3, 10.0]

sentiment:
  enabled: false
  embedding_dim: 768
