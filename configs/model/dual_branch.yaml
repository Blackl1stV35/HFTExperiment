name: dual_branch
type: dual_branch

input:
  feature_dim: 10       # 6-OHLCV + 4-micro (bar_return, wick_asym, vol_z, spread_press)
  sequence_length: 240  # 4 hours M1 — full divergence range for spread_pressure

d_model: 192

price:
  # ScatterTCNPriceBranch params (Candidate B)
  scatter_J: 3          # frequency scales
  scatter_Q: 4          # learnable filters per scale
  filter_len: 31        # FIR kernel length
  tcn_layers: 4         # CausalTCN layers after scattering
  attn_window: 20       # LocalCausalAttention window (last-20-bar signal)
  dropout: 0.1
  # Legacy keys kept for backward compat with fusion.py from_config
  inception_channels: 128
  n_inception_blocks: 2
  kernel_sizes: [3, 5, 7, 11]
  tcn_kernel_size: 3

sentiment:
  input_dim: 768
  hidden_dim: 256
  dropout: 0.3

fusion:
  heads: 4
  dropout: 0.1

classifier:
  hidden_dims: [128, 64]
  dropout: 0.4
  n_classes: 3