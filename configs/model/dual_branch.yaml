name: dual_branch
type: dual_branch

input:
  feature_dim: 10       # 6-OHLCV + 4-micro
  sequence_length: 240  # 4 hours M1

d_model: 256            # A100: was 192 — larger model fits in 80 GB HBM2e

price:
  scatter_J: 3
  scatter_Q: 4
  filter_len: 31
  tcn_layers: 4
  attn_window: 20
  dropout: 0.1
  # Legacy compat keys
  inception_channels: 128
  n_inception_blocks: 2
  kernel_sizes: [3, 5, 7, 11]
  tcn_kernel_size: 3

sentiment:
  input_dim: 768
  hidden_dim: 256
  dropout: 0.3

fusion:
  heads: 8              # A100: was 4 — more heads for d_model=256
  dropout: 0.1

classifier:
  hidden_dims: [256, 128]   # A100: was [128, 64] — wider classifier
  dropout: 0.4
  n_classes: 3