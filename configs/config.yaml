defaults:
  - model: dual_branch
  - rl: sac
  - data: xauusd
  - _self_

project:
  name: xauusd-v2
  seed: 42
  device: auto

training:
  epochs: 60
  batch_size: 2048
  learning_rate: 5e-5
  weight_decay: 1e-5
  early_stopping_patience: 15
  gradient_clip: 10.0
  mixed_precision: false
  num_workers: 0
  val_split: 0.15
  test_split: 0.10
  focal_gamma: 2.0

logging:
  wandb_project: xauusd-v2
  wandb_entity: null

paths:
  data_dir: data
  model_dir: models
  log_dir: logs
  export_dir: exports
