defaults:
  - model: dual_branch
  - rl: sac
  - data: xauusd
  - _self_

project:
  name: xauusd-v2
  seed: 42
  device: auto

training:
  epochs: 120   # extended: Run 7 not converged at ep90, LR still 2.5e-5
  batch_size: 4096          # A100 80 GB — 4× T4's 2048
  learning_rate: 5e-5
  weight_decay: 0.005   # was 0.05 — overcorrected
  early_stopping_patience: 50   # was 30 — must exceed T_0 to allow restart recovery
  gradient_clip: 10.0
  focal_gamma: 1.0
  mixed_precision: true     # bf16 on A100 — free ~20% throughput
  num_workers: 0            # GPU-pinned dataset: no CPU work to parallelise
  val_split: 0.15
  test_split: 0.10
  pin_memory: false         # data lives on GPU — PCIe pin not needed
  persistent_workers: false
  prefetch_factor: 2        # unused when num_workers=0

logging:
  wandb_project: xauusd-v2
  wandb_entity: null

paths:
  data_dir: data
  model_dir: models
  log_dir: logs
  export_dir: exports